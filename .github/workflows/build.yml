name: build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: build (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        java: [ '21' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so SonarCloud can blame each line to the right commit.
          fetch-depth: 0

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Validate Maven config
        run: mvn -B validate --no-transfer-progress

      - name: Build all modules (runs tests + coverage report)
        run: mvn -B clean install --no-transfer-progress

      - name: SonarCloud analysis
        # Only run on main pushes and PRs from the same repo — secrets are not
        # available to PRs from forks, the step would fail noisily.
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mvn -B org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
              --no-transfer-progress

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/'
          retention-days: 7

      - name: Show installed artifacts
        run: |
          echo "===== Artifacts in local repository ====="
          ls -la ~/.m2/repository/com/github/calcifux/ 2>/dev/null || true
          echo ""
          echo "===== Module jars ====="
          find . -name 'remote-download-*-*.jar' -not -path '*/target/maven-archiver/*' \
                -not -name '*-sources.jar' -not -name '*-javadoc.jar' \
                -exec ls -la {} \; 2>/dev/null
